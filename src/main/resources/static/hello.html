<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello — Azure Demo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #0078d4 0%, #005a9e 100%);
      color: white;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 4px 12px rgba(0,120,212,0.3);
    }

    header a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }

    header a:hover { color: white; }

    header .separator { color: rgba(255,255,255,0.3); }
    header .current   { color: white; font-weight: 500; font-size: 0.85rem; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .greeting-card {
      background: white;
      border-radius: 16px;
      padding: 3rem 3.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border: 1px solid #e2e8f0;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    .icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #0078d4, #005a9e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
      box-shadow: 0 4px 16px rgba(0,120,212,0.35);
    }

    .greeting-card h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    .greeting-card p {
      color: #64748b;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .response-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .response-box .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
      white-space: nowrap;
    }

    .response-box .value {
      font-family: 'Consolas', monospace;
      font-size: 0.9rem;
      color: #0078d4;
      font-weight: 500;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: #eff6ff;
      color: #0078d4;
      border: 1px solid #bfdbfe;
      border-radius: 20px;
      padding: 0.3rem 0.85rem;
      font-size: 0.78rem;
      font-weight: 500;
      margin: 0.25rem;
    }

    .tags { margin-bottom: 2rem; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #0078d4;
      color: white;
      text-decoration: none;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s, transform 0.1s;
    }

    .back-btn:hover { background: #005a9e; transform: translateY(-1px); }
    .back-btn:active { transform: translateY(0); }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: #94a3b8;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <a href="/">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Home
    </a>
    <span class="separator">/</span>
    <span class="current">hello</span>
  </header>

  <main>
    <div class="greeting-card">

      <div class="icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>

      <h1>Hello from Azure!</h1>
      <p>This response is served by a Spring Boot REST endpoint running on Azure App Service.</p>

      <div class="response-box">
        <span class="label">Response</span>
        <span class="value">"Hello from Azure App Service!"</span>
      </div>

      <div class="tags">
        <span class="tag">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          GET /hello
        </span>
        <span class="tag">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          200 OK
        </span>
        <span class="tag">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          text/plain
        </span>
      </div>

      <a class="back-btn" href="/">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Home
      </a>

    </div>
  </main>

  <footer>AZ-204 Demo &mdash; Azure App Service</footer>

</body>
</html>
